name: Trigger Cloud Deploy

# Only run this workflow when Repo 1 successfully updates the deployment file!
on:
  push:
    branches:
      - main
    paths:
      - 'deployment.yaml'

jobs:
  run-cloud-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # 1. Securely authenticate with your GCP environment
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 2. Ensure the Delivery Pipeline exists in GCP
      - name: Apply Cloud Deploy Pipeline Blueprint
        run: |
          gcloud deploy apply \
            --file=clouddeploy.yaml \
            --region="${{ secrets.ARTIFACT_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      # 3. Create the Release! (No --images flag needed because the YAML is already updated)
      - name: Create Cloud Deploy Release
        run: |
          # 1. Grab the full SHA and cut it down to the first 7 characters
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          # 2. Use the new, short variable for the release name!
          gcloud deploy releases create app-release-${SHORT_SHA} \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --region="${{ secrets.ARTIFACT_REGION }}" \
            --delivery-pipeline="my-python-app-pipeline"