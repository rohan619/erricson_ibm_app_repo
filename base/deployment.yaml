apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-python-app
  labels:
    app: my-python-app
spec:
  replicas: 2 # Runs two copies of your app for high availability
  selector:
    matchLabels:
      app: my-python-app
  template:
    metadata:
      labels:
        app: my-python-app  # name of file...
    spec:
      containers:
      - name: python-app-container
        # Placeholder image name. Kustomize `images` transformer sets the real registry + version.
        image: my-app-image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080 # Change this to the port your Python app listens on (e.g., 5000 for Flask, 8000 for FastAPI)
        resources:
          requests:
            cpu: "150m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
